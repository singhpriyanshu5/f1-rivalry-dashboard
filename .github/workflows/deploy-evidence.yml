name: Deploy Evidence Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: evidence
        run: npm ci

      - name: Build Evidence site
        working-directory: evidence
        env:
          EVIDENCE_SOURCE__snowflake__account: ${{ secrets.EVIDENCE_SOURCE__snowflake__account }}
          EVIDENCE_SOURCE__snowflake__username: ${{ secrets.EVIDENCE_SOURCE__snowflake__username }}
          EVIDENCE_SOURCE__snowflake__password: ${{ secrets.EVIDENCE_SOURCE__snowflake__password }}
        run: |
          npm run sources
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: evidence/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
