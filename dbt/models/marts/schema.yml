version: 2

models:
  - name: mart_qualifying_h2h
    description: Qualifying head-to-head between teammates per round
    columns:
      - name: season
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

  - name: mart_race_h2h
    description: Race head-to-head between teammates with DNF categories
    columns:
      - name: season
        tests:
          - not_null

  - name: mart_points_trajectory
    description: Cumulative points per driver per round
    columns:
      - name: driver_id
        tests:
          - not_null

  - name: mart_lap_pace
    description: Teammate lap pace data filtered for safety car laps
    columns:
      - name: season
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null

  - name: mart_pit_stop_h2h
    description: Pit stop head-to-head between teammates - strategy and duration comparison
    columns:
      - name: season
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

  - name: mart_lap_pace_summary
    description: Lap pace consistency summary - median, stddev, P25/P75 per driver per round
    columns:
      - name: season
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null

  - name: mart_sprint_h2h
    description: Sprint race head-to-head between teammates per round (sprint weekends only)
    columns:
      - name: season
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null

  - name: mart_season_narrative
    description: LLM-generated season narrative per driver pairing - AI Season Story
    columns:
      - name: season
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null
      - name: driver_1_code
        tests:
          - not_null
      - name: driver_2_code
        tests:
          - not_null

  - name: mart_season_summary
    description: Season summary scorecard - one row per pairing with all H2H verdicts
    columns:
      - name: season
        tests:
          - not_null
      - name: constructor_id
        tests:
          - not_null
